services:
  - type: web
    name: fleekflex-payouts
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fleekflex-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://fleekflex-payouts.onrender.com
      - key: HOUSE_EDGE
        value: "0.03"

databases:
  - name: fleekflex-db
    databaseName: fleekflex
    user: fleekflex_user
